name: Deploy Book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Create output dir
        run: mkdir -p _site

      - name: Convert Markdown to HTML
        run: |
          pandoc index.md \
            --standalone \
            --toc \
            --toc-depth=2 \
            --highlight-style=tango \
            --metadata title="SolidJS — Полное руководство на русском" \
            -V lang=ru \
            -V charset=utf-8 \
            -V "css=style.css" \
            -o _site/index.html

      - name: Copy stylesheet
        run: cp style.css _site/style.css 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
